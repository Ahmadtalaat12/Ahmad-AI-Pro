<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمدي AI | المهندس أحمد حمزاوي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f0f; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #28a745; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .user-msg { background-color: #007bff; align-self: flex-end; padding: 12px 18px; border-radius: 20px 20px 0 20px; max-width: 75%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .bot-msg { background-color: #262626; align-self: flex-start; padding: 12px 18px; border-radius: 20px 20px 20px 0; max-width: 75%; border: 1px solid #444; }
        .input-area { padding: 20px; background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 14px; border-radius: 25px; border: 1px solid #444; background: #262626; color: white; outline: none; }
        button { padding: 10px 25px; background: #28a745; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0;">أحمدي AI 🚀</h2>
        <small style="color: #aaa;">تطوير المهندس أحمد حمزاوي</small>
    </header>

    <div id="chat-container">
        <div class="bot-msg">أهلاً بك يا هندسة! أنا مساعدك الذكي "أحمدي". كيف يمكنني مساعدتك اليوم؟</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="اكتب سؤالك هنا...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script src="api/chat.js"></script>
</body>
</html>
