<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمدي AI | للمهندس أحمد حمزاوي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .user-msg { background-color: #007bff; align-self: flex-end; padding: 10px 15px; border-radius: 15px 15px 0 15px; max-width: 80%; }
        .bot-msg { background-color: #333; align-self: flex-start; padding: 10px 15px; border-radius: 15px 15px 15px 0; max-width: 80%; }
        .input-area { padding: 20px; background: #1e1e1e; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; outline: none; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #28a745;">أحمدي AI 🚀</h2>
    <p style="text-align: center; font-size: 12px;">تطوير المهندس أحمد حمزاوي</p>

    <div id="chat-container">
        <div class="bot-msg">أهلاً بك يا هندسة! أنا مساعدك الذكي، كيف أخدمك اليوم؟</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="اكتب رسالتك هنا...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script src="chat.js"></script>
</body>
</html>
