<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد أحمد طلعت الذكي</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #e5ddd5; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
        }
        header { 
            background-color: #075e54; 
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-size: 1.2rem; 
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
        }
        .message { 
            max-width: 80%; 
            padding: 10px 15px; 
            border-radius: 15px; 
            font-size: 0.95rem; 
            line-height: 1.4;
        }
        .user { 
            align-self: flex-end; 
            background-color: #dcf8c6; 
            color: #000; 
            border-bottom-right-radius: 2px;
        }
        .ai { 
            align-self: flex-start; 
            background-color: #fff; 
            color: #000; 
            border-bottom-left-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .input-area { 
            background: #f0f0f0; 
            padding: 10px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        input { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 25px; 
            outline: none; 
            font-size: 1rem;
        }
        button { 
            background-color: #075e54; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 45px; 
            height: 45px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 1.2rem;
        }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

<header>مساعد أحمد طلعت</header>

<div id="chat-container">
    <div class="message ai">أهلاً يا أحمد! أنا المساعد الخاص بيك، جاهز لأي أوامر.</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">➤</button>
</div>

<script src="script.js"></script>

<script>
    // دالة مساعدة لو الـ script.js الخارجي متأخر أو فيه مشكلة
    function displayMessage(sender, text) {
        const container = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + (sender === 'أنت' ? 'user' : 'ai');
        msgDiv.innerText = text;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
