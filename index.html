<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Ahmad AI Pro</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat { width: 100%; max-width: 400px; background: #1e1e1e; border-radius: 10px; padding: 15px; }
        #msgs { height: 350px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { padding: 10px; margin: 5px; border-radius: 8px; max-width: 80%; }
        .u { align-self: flex-end; background: #007bff; }
        .b { align-self: flex-start; background: #333; color: #00ccaa; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #2c2c2c; color: white; }
        button { padding: 10px; background: #00ccaa; border: none; border-radius: 5px; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Ahmad AI Pro</h2>
    <div id="chat">
        <div id="msgs"></div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="text" id="i" placeholder="اكتب هنا...">
            <button onclick="send()">إرسال</button>
        </div>
    </div>
    <script>
        async function send() {
            const i = document.getElementById("i");
            const m = document.getElementById("msgs");
            if(!i.value) return;
            const text = i.value;
            m.innerHTML += `<div class="msg u">${text}</div>`;
            i.value = "";
            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({message: text})
                });
                const d = await res.json();
                m.innerHTML += `<div class="msg b">${d.reply || "مفيش رد"}</div>`;
            } catch (e) { m.innerHTML += `<div class="msg b">خطأ اتصال</div>`; }
            m.scrollTop = m.scrollHeight;
        }
    </script>
</body>
</html>
