<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmad AI Pro</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            height: 100%; margin: 0; overflow: hidden; 
            background-color: #0f172a; font-family: sans-serif; 
        }
        #chat-container { 
            display: flex; flex-direction: column; height: 100vh; 
            width: 100%; max-width: 500px; margin: 0 auto; background: #1e293b; 
        }
        header { 
            background: #0ea5e9; padding: 15px; text-align: center; 
            font-weight: bold; color: white; flex-shrink: 0; 
        }
        #chat-box { 
            flex: 1; padding: 15px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 12px; color: white; 
        }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; }
        .user-message { align-self: flex-end; background: #0ea5e9; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }
        .input-area { 
            padding: 15px; background: #1e293b; display: flex; 
            gap: 10px; border-top: 1px solid #334155; flex-shrink: 0; 
        }
        input { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 12px; color: white; border-radius: 8px; outline: none; }
        button { background: #0ea5e9; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; }
        .typing { font-style: italic; color: #94a3b8; animation: blink 1s infinite; margin-bottom: 5px; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="chat-container">
        <header>Ahmad AI Pro 🚀</header>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="اكتب رسالتك هنا...">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>
    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            if (!input.value) return;
            const userMsg = input.value;
            box.innerHTML += `<div class="message user-message">${userMsg}</div>`;
            input.value = '';
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai-message typing';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = 'جاري الكتابة...';
            box.appendChild(typingDiv);
            box.scrollTop = box.scrollHeight;
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userMsg })
                });
                const data = await response.json();
                document.getElementById('typing-indicator').remove();
                box.innerHTML += `<div class="message ai-message">${data.reply}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch (e) {
                if(document.getElementById('typing-indicator')) document.getElementById('typing-indicator').remove();
                box.innerHTML += `<div class="message ai-message">حصل مشكلة يا بطل!</div>`;
            }
        }
    </script>
</body>
</html>
