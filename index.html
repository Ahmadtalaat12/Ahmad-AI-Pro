<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد أحمد طلعت</title>
    <style>
        /* كود الـ CSS مدمج هنا */
        body { font-family: sans-serif; background-color: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 1rem; }
        .user { align-self: flex-end; background-color: #dcf8c6; }
        .ai { align-self: flex-start; background-color: #fff; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }
        button { background-color: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
    </style>
</head>
<body>

<header>مساعد أحمد طلعت الذكي</header>
<div id="chat-container">
    <div class="message ai">أهلاً بك يا أحمد، كيف يمكنني مساعدتك اليوم؟</div>
</div>
<div class="input-area">
    <input type="text" id="user-input" placeholder="اكتب رسالتك...">
    <button onclick="sendMessage()">➤</button>
</div>

<script>
    // كود الـ JavaScript مدمج هنا
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();
        if (!text) return;

        displayMessage('أنت', text);
        input.value = '';

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });
            const data = await response.json();
            displayMessage('مساعد أحمد', data.reply || "لم أستطع فهم ذلك.");
        } catch (e) {
            displayMessage('مساعد أحمد', "حدث خطأ في الاتصال.");
        }
    }

    function displayMessage(sender, text) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = 'message ' + (sender === 'أنت' ? 'user' : 'ai');
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
